<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PyCoder — ブラウザで Python を実行しよう</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">Py<span>Coder</span></a>
    <span class="tagline">ブラウザで Python を実行してテストを通そう</span>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-item">
    <div class="stat-value" id="stat-solved">0</div>
    <div class="stat-label">解いた問題</div>
  </div>
  <div class="stat-item">
    <div class="stat-value" id="stat-total">0</div>
    <div class="stat-label">総問題数</div>
  </div>
</div>

<main class="container">
  <div class="problem-list-header">
    <h2>問題一覧</h2>
    <div class="filters">
      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="easy">Easy</button>
      <button class="filter-btn" data-filter="medium">Medium</button>
      <button class="filter-btn" data-filter="hard">Hard</button>
    </div>
  </div>

  <table class="problem-table">
    <thead>
      <tr>
        <th>#</th>
        <th>タイトル</th>
        <th>難易度</th>
        <th>ステータス</th>
      </tr>
    </thead>
    <tbody id="problem-list"></tbody>
  </table>
</main>

<script src="js/problems.js"></script>
<script src="js/app.js"></script>
</body>
</html>
